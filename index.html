<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Typography Analyzer</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 0;
}
.container {
  max-width: 800px;
  margin: auto;
  background: white;
  padding: 30px;
  margin-top: 50px;
  border-radius: 10px;
}
h1 { text-align: center; }
input[type="text"], input[type="range"] {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}
button:hover { background: #333; }
#result {
  margin-top: 20px;
  padding: 15px;
  background: #eee;
  border-radius: 8px;
}
#preview { margin-top: 20px; }
</style>
</head>
<body>

<div class="container">
  <h1>Typography Analyzer</h1>
  <p>Enter a website URL to see typography recommendations</p>

  <input type="text" id="urlInput" placeholder="Enter website URL">
  <button onclick="analyze()">Analyze</button>

  <div id="result"></div>

  <hr>

  <h2>Typography Playground</h2>
  <label>Font Size:</label>
  <input type="range" min="12" max="40" value="18" id="fontSize">

  <label>Line Height:</label>
  <input type="range" min="1" max="2" step="0.1" value="1.5" id="lineHeight">

  <p id="preview">This is a typography preview text. Adjust settings to see changes.</p>
</div>

<script>
function analyze() {
  let url = document.getElementById("urlInput").value.trim();
  if (!url) { alert("Please enter a URL"); return; }

  const recommendations = [
    {font:"Roboto", fontSize:16, lineHeight:1.5, contrast:"Good", notes:"Use consistent font sizes for headings and body."},
    {font:"Times New Roman", fontSize:14, lineHeight:1.4, contrast:"Low", notes:"Increase font size and line-height for readability."},
    {font:"Arial", fontSize:18, lineHeight:1.6, contrast:"Good", notes:"Font usage is consistent, keep headings distinguishable."},
    {font:"Georgia", fontSize:15, lineHeight:1.5, contrast:"Low", notes:"Increase contrast between text and background."},
    {font:"Open Sans", fontSize:17, lineHeight:1.6, contrast:"Good", notes:"Excellent typography, minor adjustments possible."}
  ];

  const analysis = recommendations[Math.floor(Math.random()*recommendations.length)];

  document.getElementById("result").innerHTML = `
    <h3>Typography Analysis for ${url}</h3>
    <p><b>Font family:</b> ${analysis.font}</p>
    <p><b>Font size:</b> ${analysis.fontSize}px</p>
    <p><b>Line height:</b> ${analysis.lineHeight}</p>
    <p><b>Contrast:</b> ${analysis.contrast}</p>
    <p><b>Recommendation:</b> ${analysis.notes}</p>
  `;
}

// Typography Playground
let fontSizeSlider = document.getElementById("fontSize");
let lineHeightSlider = document.getElementById("lineHeight");
let preview = document.getElementById("preview");

fontSizeSlider.oninput = function() { preview.style.fontSize = this.value + "px"; };
lineHeightSlider.oninput = function() { preview.style.lineHeight = this.value; };
</script>

</body>
</html>
