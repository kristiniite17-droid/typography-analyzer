<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Real Typography Analyzer Pro</title>
<style>
body { font-family: Arial, sans-serif; background:#f5f5f5; margin:0; padding:0; }
.container { max-width:950px; margin:auto; background:white; padding:30px; margin-top:50px; border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.1);}
h1 { text-align:center; }
input[type="text"], button { width:100%; padding:10px; margin-top:10px; border-radius:5px; border:1px solid #ccc; }
button { background:black; color:white; border:none; cursor:pointer; font-size:16px; transition:0.3s; }
button:hover { background:#333; }
#result { margin-top:20px; }
.analysis-box { padding:15px; border-radius:8px; margin-bottom:15px; color:white; box-shadow:0 2px 5px rgba(0,0,0,0.2); transition: transform 0.2s; }
.analysis-box:hover { transform: scale(1.02); }
.good { background:#28a745; }
.needs { background:#dc3545; }
#statusDiagram { display:flex; justify-content:space-around; margin-top:20px; }
.status-bar { width:45%; padding:10px; border-radius:5px; color:white; text-align:center; font-weight:bold; box-shadow:0 2px 5px rgba(0,0,0,0.2);}
.status-good { background:#28a745; }
.status-needs { background:#dc3545; }
</style>
</head>
<body>

<div class="container">
<h1>Real Typography Analyzer Pro</h1>
<p>Enter a website URL to analyze its typography</p>

<input type="text" id="urlInput" placeholder="https://example.com">
<button onclick="analyze()">Analyze</button>

<div id="result"></div>

<div id="statusDiagram">
  <div class="status-bar status-good" id="goodCount">Good: 0</div>
  <div class="status-bar status-needs" id="needsCount">Needs Improvement: 0</div>
</div>
</div>

<script>
let goodTotal = 0, needsTotal = 0;

async function analyze() {
  const url = document.getElementById("urlInput").value.trim();
  if(!url){ alert("Please enter a URL"); return; }
  
  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "Loading...";

  try {
    const proxy = "https://api.allorigins.win/get?url=" + encodeURIComponent(url);
    const response = await fetch(proxy);
    const data = await response.json();
    const parser = new DOMParser();
    const doc = parser.parseFromString(data.contents, "text/html");

    const elements = [];
    elements.push(...Array.from(doc.querySelectorAll("body")).slice(0,1));
    elements.push(...Array.from(doc.querySelectorAll("h1,h2,h3")).slice(0,3));
    elements.push(...Array.from(doc.querySelectorAll("p")).slice(0,3));

    let htmlResult = "";
    goodTotal = 0; needsTotal = 0;

    elements.forEach(el => {
      const style = el.getAttribute("style") || "";
      const fontFamily = el.style.fontFamily || "Unknown";
      const fontSize = el.style.fontSize || "16px";
      const lineHeight = el.style.lineHeight || "1.5";

      // Vienkārša analīze pēc font-size
      let status = "good";
      let notes = "Typography looks fine.";
      const sizeNum = parseFloat(fontSize);
      if(sizeNum && sizeNum < 14) { status="needs"; notes="Increase font size for readability."; }

      if(status==='good'){ goodTotal++; } else { needsTotal++; }

      htmlResult += `<div class="analysis-box ${status}">
        <p><b>Tag:</b> ${el.tagName}</p>
        <p><b>Font family:</b> ${fontFamily}</p>
        <p><b>Font size:</b> ${fontSize}</p>
        <p><b>Line height:</b> ${lineHeight}</p>
        <p><b>Recommendation:</b> ${notes}</p>
      </div>`;
    });

    resultDiv.innerHTML = htmlResult;
    document.getElementById("goodCount").innerText = "Good: " + goodTotal;
    document.getElementById("needsCount").innerText = "Needs Improvement: " + needsTotal;

  } catch (error) {
    resultDiv.innerHTML = `<p style="color:red;">Error fetching or analyzing the page. Make sure the URL is correct.</p>`;
    console.error(error);
  }
}
</script>

</body>
</html>
