<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Typography Analyzer Interactive Pro</title>
<style>
body { font-family: Arial, sans-serif; background:#f5f5f5; margin:0; padding:0; }
.container { max-width:950px; margin:auto; background:white; padding:30px; margin-top:50px; border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.1);}
h1 { text-align:center; }
input[type="text"], select, input[type="range"] { width:100%; padding:10px; margin-top:10px; border-radius:5px; border:1px solid #ccc; }
button { width:100%; padding:12px; margin-top:10px; background:black; color:white; border:none; cursor:pointer; font-size:16px; border-radius:5px; transition:0.3s;}
button:hover { background:#333; }
#result { margin-top:20px; }
.analysis-box { padding:15px; border-radius:8px; margin-bottom:15px; color:white; box-shadow:0 2px 5px rgba(0,0,0,0.2); transition: transform 0.2s; }
.analysis-box:hover { transform: scale(1.02); }
.good { background:#28a745; }
.needs { background:#dc3545; }
#preview { margin-top:20px; border:1px solid #ccc; padding:15px; border-radius:5px; transition: all 0.3s; }
label { display:block; margin-top:15px; font-weight:bold; }
#statusDiagram { display:flex; justify-content:space-around; margin-top:20px; }
.status-bar { width:45%; padding:10px; border-radius:5px; color:white; text-align:center; font-weight:bold; box-shadow:0 2px 5px rgba(0,0,0,0.2);}
.status-good { background:#28a745; }
.status-needs { background:#dc3545; }
</style>
</head>
<body>

<div class="container">
<h1>Typography Analyzer Interactive Pro</h1>
<p>Enter a website URL to get professional typography recommendations</p>

<input type="text" id="urlInput" placeholder="Enter website URL">
<button onclick="analyze()">Analyze</button>

<div id="result"></div>

<div id="statusDiagram">
  <div class="status-bar status-good" id="goodCount">Good: 0</div>
  <div class="status-bar status-needs" id="needsCount">Needs Improvement: 0</div>
</div>

<hr>

<h2>Typography Playground</h2>
<label>Font Family:</label>
<select id="fontFamily">
  <option>Arial</option>
  <option>Roboto</option>
  <option>Open Sans</option>
  <option>Times New Roman</option>
  <option>Georgia</option>
  <option>Lato</option>
</select>

<label>Font Size:</label>
<input type="range" min="12" max="40" value="18" id="fontSize">

<label>Line Height:</label>
<input type="range" min="1" max="2" step="0.1" value="1.5" id="lineHeight">

<p id="preview">This is a typography preview text. Adjust settings to see changes.</p>
</div>

<script>
const recommendations = [
{font:"Roboto", fontSize:16, lineHeight:1.5, contrast:"Good", spacing:"Normal", notes:"Use consistent font sizes for headings and body.", status:"good"},
{font:"Times New Roman", fontSize:14, lineHeight:1.4, contrast:"Low", spacing:"Tight", notes:"Increase font size and line-height for readability.", status:"needs"},
{font:"Arial", fontSize:18, lineHeight:1.6, contrast:"Good", spacing:"Normal", notes:"Font usage is consistent, keep headings distinguishable.", status:"good"},
{font:"Georgia", fontSize:15, lineHeight:1.5, contrast:"Low", spacing:"Tight", notes:"Increase contrast between text and background.", status:"needs"},
{font:"Open Sans", fontSize:17, lineHeight:1.6, contrast:"Good", spacing:"Normal", notes:"Excellent typography, minor adjustments possible.", status:"good"},
{font:"Lato", fontSize:16, lineHeight:1.5, contrast:"Good", spacing:"Normal", notes:"Headings are clear, body text readable.", status:"good"},
{font:"Verdana", fontSize:15, lineHeight:1.5, contrast:"Low", spacing:"Tight", notes:"Increase line-height for better readability.", status:"needs"},
{font:"Merriweather", fontSize:18, lineHeight:1.7, contrast:"Good", spacing:"Normal", notes:"Good for long text, consider heading styles.", status:"good"},
{font:"PT Sans", fontSize:16, lineHeight:1.5, contrast:"Good", spacing:"Normal", notes:"Consistent typography overall.", status:"good"},
{font:"Nunito", fontSize:17, lineHeight:1.6, contrast:"Low", spacing:"Normal", notes:"Consider better contrast for text and background.", status:"needs"},
{font:"Raleway", fontSize:16, lineHeight:1.5, contrast:"Good", spacing:"Normal", notes:"Modern font, good readability.", status:"good"},
{font:"Ubuntu", fontSize:15, lineHeight:1.5, contrast:"Low", spacing:"Tight", notes:"Increase spacing for body text.", status:"needs"},
{font:"PT Serif", fontSize:17, lineHeight:1.6, contrast:"Good", spacing:"Normal", notes:"Great for headings and paragraphs.", status:"good"},
{font:"Source Sans Pro", fontSize:16, lineHeight:1.5, contrast:"Good", spacing:"Normal", notes:"Font is readable and clean.", status:"good"},
{font:"Fira Sans", fontSize:16, lineHeight:1.5, contrast:"Low", spacing:"Tight", notes:"Consider increasing line height for readability.", status:"needs"},
{font:"Playfair Display", fontSize:18, lineHeight:1.6, contrast:"Good", spacing:"Normal", notes:"Elegant headings, keep body readable.", status:"good"},
{font:"Josefin Sans", fontSize:16, lineHeight:1.5, contrast:"Good", spacing:"Normal", notes:"Stylish font, readable for body.", status:"good"},
{font:"Roboto Slab", fontSize:17, lineHeight:1.6, contrast:"Low", spacing:"Tight", notes:"Improve contrast and line spacing.", status:"needs"},
{font:"Comfortaa", fontSize:16, lineHeight:1.5, contrast:"Good", spacing:"Normal", notes:"Readable headings and body.", status:"good"},
{font:"Quicksand", fontSize:16, lineHeight:1.5, contrast:"Good", spacing:"Normal", notes:"Light and clean font style.", status:"good"}
];

let goodTotal = 0, needsTotal = 0;

function analyze() {
const url = document.getElementById("urlInput").value.trim();
if(!url){ alert("Please enter a URL"); return; }

const index = url.length % recommendations.length;
const analysis = recommendations[index];
const statusText = analysis.status==='good'?'✅ Good typography':'⚠️ Needs improvement';

// Update counts
if(analysis.status==='good'){ goodTotal++; } else { needsTotal++; }

document.getElementById("result").innerHTML = `
  <div class="analysis-box ${analysis.status}">
    <h3>Typography Analysis for ${url}</h3>
    <p><b>Font family:</b> ${analysis.font}</p>
    <p><b>Font size:</b> ${analysis.fontSize}px</p>
    <p><b>Line height:</b> ${analysis.lineHeight}</p>
    <p><b>Contrast:</b> ${analysis.contrast}</p>
    <p><b>Letter spacing:</b> ${analysis.spacing}</p>
    <p><b>Recommendation:</b> ${analysis.notes}</p>
    <p><b>Status:</b> ${statusText}</p>
  </div>
`;
document.getElementById("goodCount").innerText = "Good: " + goodTotal;
document.getElementById("needsCount").innerText = "Needs Improvement: " + needsTotal;
}

// Playground sliders and font family
const fontSizeSlider = document.getElementById("fontSize");
const lineHeightSlider = document.getElementById("lineHeight");
const fontFamilySelect = document.getElementById("fontFamily");
const preview = document.getElementById("preview");

fontSizeSlider.oninput = function(){ preview.style.fontSize = this.value + "px"; };
lineHeightSlider.oninput = function(){ preview.style.lineHeight = this.value; };
fontFamilySelect.onchange = function(){ preview.style.fontFamily = this.value; };
</script>

</body>
</html>
